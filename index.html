<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fahim Ahmed (সম্পদ)</title>

  <!-- Font Awesome (Official Brand Icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0e0f11;        /* obsidian black */
      --card: #16181c;
      --text: #f1efe9;      /* off white */
      --muted: #bdb8a9;
      --border: rgba(255,255,255,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1c20, var(--bg));
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      padding: 32px 26px;
      background: linear-gradient(180deg, #15171b, #0e0f11);
      border-radius: 18px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 18px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 26px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      transition: all 0.25s ease;
    }

    .link:hover {
      transform: translateY(-2px);
      background: #1c1f25;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .link span {
      font-size: 15px;
      font-weight: 500;
    }

    footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.6px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">
      <!-- Replace profile.jpg with your photo -->
      <img src="profile.jpg" alt="Fahim Ahmed">
    </div>

    <h1>Fahim Ahmed (সম্পদ)</h1>
    <div class="subtitle">Timeless Presence</div>

    <div class="links">

      <a class="link" href="https://www.instagram.com/fahimahmed.in" target="_blank">
        <div class="icon"><i class="fa-brands fa-instagram"></i></div>
        <span>Instagram</span>
      </a>

      <a class="link" href="https://www.facebook.com/fahimahmed.net" target="_blank">
        <div class="icon"><i class="fa-brands fa-facebook-f"></i></div>
        <span>Facebook</span>
      </a>

      <a class="link" href="https://x.com/fahimahmed9118" target="_blank">
        <div class="icon"><i class="fa-brands fa-x-twitter"></i></div>
        <span>X (Twitter)</span>
      </a>

      <a class="link" href="https://www.threads.com/@fahimahmed.in" target="_blank">
        <div class="icon"><i class="fa-brands fa-threads"></i></div>
        <span>Threads</span>
      </a>

      <a class="link" href="https://t.me/fahim9118" target="_blank">
        <div class="icon"><i class="fa-brands fa-telegram"></i></div>
        <span>Telegram</span>
      </a>

    </div>

    <footer>
      © Fahim Ahmed
    </footer>
  </div>

</body>
